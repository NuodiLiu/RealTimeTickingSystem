# Adapted from solutions-automated-tests/.github/workflows/e2e.yml.
# Runs the Serenity BDD + Cucumber suite in /frontend-tests against a deployed
# environment. Like the reference workflow, it supports manual dispatch with
# build_type / test_tags / environment inputs and uploads Serenity reports.
#
# Differences from the reference:
#   * Runs on ubuntu-latest instead of windows-latest — Chrome + ChromeDriver
#     are pre-installed on GitHub-hosted Ubuntu runners, so no chocolatey step
#     is needed.
#   * Path-filtered to /frontend-tests so it doesn't burn CI minutes on
#     Swift / Node / docs-only commits.
#   * Uses MS_* secrets for the Microsoft SSO credentials instead of the
#     UNSW SLK / JRP / ZID service accounts.

name: Execute Frontend E2E Tests

on:
  push:
    branches: [main]
    paths:
      - "frontend-tests/**"
      - "frontend/**"
      - ".github/workflows/frontend-tests-e2e.yml"
  pull_request:
    paths:
      - "frontend-tests/**"
      - "frontend/**"
      - ".github/workflows/frontend-tests-e2e.yml"
  workflow_dispatch:
    inputs:
      build_type:
        description: "Type of build to perform"
        required: false
        default: "verify"
        type: choice
        options:
          - verify
          - clean verify
      test_tags:
        description: "Cucumber tag expression (e.g. @Smoke, '@Login and not @SSO')"
        required: false
        default: ""
      environment:
        description: "Test execution environment (local | test | staging)"
        required: false
        default: ""

permissions:
  contents: read

jobs:
  build:
    name: build + e2e
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: frontend-tests

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show runner info
        run: |
          echo "Runner name: ${{ runner.name }}"
          echo "Runner OS: ${{ runner.os }}"
          echo "Runner arch: ${{ runner.arch }}"
          echo "Workflow:   ${{ github.workflow }}"
          echo "Job:        ${{ github.job }}"
          echo "Repository: ${{ github.repository }}"
          echo "Workspace:  $GITHUB_WORKSPACE"
          hostname
        shell: bash

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Show Chrome / driver versions
        working-directory: .
        run: |
          google-chrome --version || true
          chromedriver --version || true

      - name: Start Xvfb (virtual display so serenity.conf's headless.mode=false works on CI)
        working-directory: .
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends xvfb
          Xvfb :99 -screen 0 1920x1080x24 -ac +extension RANDR > /tmp/xvfb.log 2>&1 &
          echo $! > /tmp/xvfb.pid
          echo "DISPLAY=:99" >> $GITHUB_ENV
          # Wait for Xvfb process to be running and accepting connections
          for i in {1..10}; do
            if kill -0 "$(cat /tmp/xvfb.pid)" 2>/dev/null && [ -S /tmp/.X11-unix/X99 ]; then
              echo "Xvfb up after ${i} attempt(s) (pid $(cat /tmp/xvfb.pid))"
              exit 0
            fi
            sleep 1
          done
          echo "::error::Xvfb failed to start"
          cat /tmp/xvfb.log
          exit 1

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Start frontend dev server
        working-directory: frontend
        run: |
          nohup npm run dev > /tmp/frontend.log 2>&1 &
          echo $! > /tmp/frontend.pid
          for i in {1..60}; do
            if curl -fs http://localhost:3001/login > /dev/null; then
              echo "Frontend ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "::error::Frontend never came up on :3001"
          tail -80 /tmp/frontend.log
          exit 1

      - name: Compile tests
        run: mvn -B test-compile

      - name: Execute Frontend E2E Tests
        shell: bash
        env:
          MS_USERNAME: ${{ secrets.MS_USERNAME }}
          MS_PASSWORD: ${{ secrets.MS_PASSWORD }}
        run: |
          set -euo pipefail

          # Resolve dispatch inputs with sensible defaults that mirror the
          # reference e2e.yml.
          BUILD_TYPE="${{ github.event.inputs.build_type }}"
          TEST_TAGS="${{ github.event.inputs.test_tags }}"
          ENVIRONMENT="${{ github.event.inputs.environment }}"

          BUILD_TYPE="${BUILD_TYPE:-verify}"

          # On CI we don't run a backend, so scenarios that need an
          # authenticated dashboard, admin role, or working OAuth callback
          # can't succeed. Default to the subset that works against a
          # frontend-only stack; the dispatch input overrides this if you
          # point at a deployed env with a backend.
          if [ -z "$TEST_TAGS" ]; then
            TEST_TAGS="(@Login or @Navigation or @PublicDisplay) and not @SSO"
          fi

          MAVEN_CMD=(mvn -B $BUILD_TYPE "-Dcucumber.filter.tags=$TEST_TAGS")

          if [ -n "$ENVIRONMENT" ]; then
            MAVEN_CMD+=("-Denvironment=$ENVIRONMENT")
          fi

          if [ -n "${MS_USERNAME:-}" ] && [ -n "${MS_PASSWORD:-}" ]; then
            MAVEN_CMD+=("-DusernameMS=$MS_USERNAME" "-DpasswordMS=$MS_PASSWORD")
          else
            echo "::warning::MS_USERNAME / MS_PASSWORD secrets are not set — @SSO and @Dashboard scenarios will fail."
          fi

          echo "Running: ${MAVEN_CMD[*]}"
          "${MAVEN_CMD[@]}"

      - name: Stop frontend dev server
        if: always()
        run: |
          if [ -f /tmp/frontend.pid ]; then
            kill "$(cat /tmp/frontend.pid)" 2>/dev/null || true
          fi

      - name: Upload frontend log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dev-log
          path: /tmp/frontend.log
          if-no-files-found: ignore

      - name: Save Serenity Test Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: serenity-reports
          path: frontend-tests/target/site/serenity
          if-no-files-found: warn
          compression-level: 6
          overwrite: false
          include-hidden-files: false
