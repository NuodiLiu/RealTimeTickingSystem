serenity {
    take.screenshots = AFTER_EACH_STEP
    full.page.screenshot.strategy = true
}

headless.mode = false
webdriver {
  driver = chrome
  timeouts {
    implicitlywait = 10000
    fluentwait = 10000
  }
  capabilities {
    browserName = "chrome"
    acceptInsecureCerts = true
    "goog:chromeOptions" {
      args = ["remote-allow-origins=*","test-type", "no-sandbox", "ignore-certificate-errors", "--start-maximized",
        "incognito", "disable-infobars", "disable-gpu", "disable-default-apps", "disable-popup-blocking",
        "disable-dev-shm-usage", "disable-extensions", "disable-web-security", "disable-translate", "disable-logging"
        ]
    }
  }
}

environment = local

environments {
  default {
    frontend.url = "http://localhost:3001"
    backend.url = "http://localhost:3000"
  }
  local {
    frontend.url = "http://localhost:3001"
    backend.url = "http://localhost:3000"
    environment = 'local'
  }
  test {
    frontend.url = "https://ca-tickets-frontend.proudrock-35e0b5da.australiaeast.azurecontainerapps.io"
    backend.url = "https://ca-tickets-backend.proudrock-35e0b5da.australiaeast.azurecontainerapps.io"
    environment = 'test'
  }
  staging {
    frontend.url = "https://staging-ticketing.example.com"
    backend.url = "https://api-staging-ticketing.example.com"
    environment = 'staging'
  }
}
