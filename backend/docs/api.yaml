openapi: 3.0.3
info:
  title: RealTime Ticketing System API
  description: |
    API for managing real-time ticketing and case management with device integration, 
    WebSocket support, and Azure AD authentication.
    
    ## Authentication
    
    - **Session-based**: For staff/admin via Azure AD SSO
    - **Device-based**: For kiosk devices using device secrets
 
    
servers:
  - url: http://localhost:3000
    description: Development server


paths:
  /health:
    get:
      tags:
        - Health
      summary: Health check endpoint
      description: Returns system health status and connected devices count
      responses:
        '200':
          description: System is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  timestamp:
                    type: string
                    format: date-time
                  connectedDevices:
                    type: integer
                    description: Number of connected devices
                  onlineDeviceIds:
                    type: array
                    items:
                      type: string
                    description: List of online device IDs

  # Authentication Routes
  /auth/login:
    get:
      tags:
        - Authentication
      summary: Initiate Azure AD login
      description: Redirects to Azure AD login page or returns 204 if already logged in
      responses:
        '302':
          description: Redirect to Azure AD login
        '204':
          description: Already logged in

  /auth/callback:
    get:
      tags:
        - Authentication
      summary: Azure AD callback handler
      description: Handles the callback from Azure AD after successful authentication
      parameters:
        - name: code
          in: query
          required: true
          schema:
            type: string
          description: Authorisation code from Azure AD
        - name: state
          in: query
          required: true
          schema:
            type: string
          description: State parameter for CSRF protection
      responses:
        '302':
          description: Redirect to frontend application
        '400':
          description: Invalid callback parameters
        '401':
          description: Authentication failed

  /auth/logout:
    post:
      tags:
        - Authentication
      summary: Logout user
      description: Clears session and optionally redirects to Azure AD logout
      responses:
        '200':
          description: Successfully logged out
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true

  /auth/me:
    get:
      tags:
        - Authentication
      summary: Get current user information
      description: Returns the currently authenticated user's information
      responses:
        '200':
          description: Current user information
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/User'
                    nullable: true

  /auth/refresh:
    post:
      tags:
        - Authentication
      summary: Refresh session
      description: Validates and refreshes the current session
      responses:
        '200':
          description: Session refreshed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
        '401':
          description: No valid session

  # Cases Routes
  /cases/public-queue:
    get:
      tags:
        - Cases
      summary: Get public queue display
      description: Returns queue information for public displays 
      responses:
        '200':
          description: Public queue data
          content:
            application/json:
              schema:
                type: object
                properties:
                  queueLength:
                    type: integer
                  averageWaitTime:
                    type: integer
                    description: Average wait time in minutes
                  currentlyServing:
                    type: array
                    items:
                      type: object
                      properties:
                        caseNumber:
                          type: string
                        category:
                          type: string

  /cases:
    get:
      tags:
        - Cases
      summary: List cases with filters
      description: Retrieve cases based on status and other filters
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [queued, in_progress, resolved_pending_feedback, resolved]
          description: Filter by case status
      responses:
        '200':
          description: List of cases
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Case'
        '400':
          description: Invalid status parameter
        '401':
          description: Authentication required
        '403':
          description: Staff access required

    post:
      tags:
        - Cases
      summary: Create new case
      description: Create a new support case (device authentication required)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - zID
                - studentName
                - category
              properties:
                zID:
                  type: string
                  description: Student ID
                  example: z1234567
                studentName:
                  type: string
                  description: Student's full name
                  example: John Doe
                category:
                  type: string
                  description: Support category
                  example: Technical Support
      responses:
        '201':
          description: Case created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Case'
        '400':
          description: Invalid request data
        '401':
          description: Device authentication required

  /cases/take-next:
    post:
      tags:
        - Cases
      summary: Take next available case
      description: Assign the next queued case to the current staff member (FIFO)
      responses:
        '200':
          description: Case assigned successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Case'
        '400':
          description: No cases available or user authentication required
        '401':
          description: Authentication required
        '403':
          description: Staff access required

  /cases/{id}/take:
    post:
      tags:
        - Cases
      summary: Take specific case
      description: Assign a specific case to the current staff member
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Case ID
      responses:
        '200':
          description: Case assigned successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Case'
        '400':
          description: User authentication required
        '401':
          description: Authentication required
        '403':
          description: Staff access required
        '404':
          description: Case not found

  /cases/{id}/resolve:
    post:
      tags:
        - Cases
      summary: Resolve case
      description: Mark a case as resolved
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Case ID
      responses:
        '200':
          description: Case resolved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Case'
        '401':
          description: Authentication required
        '403':
          description: Staff access required
        '404':
          description: Case not found

  /cases/{id}/escalate:
    post:
      tags:
        - Cases
      summary: Escalate case
      description: Escalate a case to another staff member or supervisor
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Case ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                escalatedTo:
                  type: string
                  description: Staff member to escalate to
                reason:
                  type: string
                  description: Reason for escalation
      responses:
        '200':
          description: Case escalated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Case'
        '401':
          description: Authentication required
        '403':
          description: Staff access required
        '404':
          description: Case not found

  # Device Routes
  /device:
    get:
      tags:
        - Devices
      summary: List all devices
      description: Retrieve all registered devices with their status
      responses:
        '200':
          description: List of devices
          content:
            application/json:
              schema:
                type: object
                properties:
                  devices:
                    type: array
                    items:
                      $ref: '#/components/schemas/Device'
        '401':
          description: Authentication required
        '403':
          description: Staff access required

  /device/by-mode/{mode}:
    get:
      tags:
        - Devices
      summary: Get devices by mode
      description: Retrieve devices filtered by their current mode
      parameters:
        - name: mode
          in: path
          required: true
          schema:
            type: string
            enum: [REGISTRATION, FEEDBACK]
          description: Device mode
      responses:
        '200':
          description: List of devices in specified mode
          content:
            application/json:
              schema:
                type: object
                properties:
                  devices:
                    type: array
                    items:
                      $ref: '#/components/schemas/Device'
                  mode:
                    type: string
                  count:
                    type: integer
        '400':
          description: Invalid device mode
        '401':
          description: Authentication required
        '403':
          description: Staff access required

  /device/online/{mode}:
    get:
      tags:
        - Devices
      summary: Get online devices by mode
      description: Retrieve only online devices filtered by their current mode
      parameters:
        - name: mode
          in: path
          required: true
          schema:
            type: string
            enum: [REGISTRATION, FEEDBACK]
          description: Device mode
      responses:
        '200':
          description: List of online devices in specified mode
          content:
            application/json:
              schema:
                type: object
                properties:
                  devices:
                    type: array
                    items:
                      $ref: '#/components/schemas/Device'
                  mode:
                    type: string
                  count:
                    type: integer
        '400':
          description: Invalid device mode
        '401':
          description: Authentication required
        '403':
          description: Staff access required

  /device/heartbeat:
    post:
      tags:
        - Devices
      summary: Device heartbeat
      description: Update device last seen timestamp (device authentication required)
      responses:
        '200':
          description: Heartbeat recorded successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  lastSeenAt:
                    type: string
                    format: date-time
        '400':
          description: Device authentication required
        '401':
          description: Invalid device authentication

  /device/status:
    get:
      tags:
        - Devices
      summary: Get device status
      description: Get current device status and configuration (device authentication required)
      responses:
        '200':
          description: Device status information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeviceStatus'
        '400':
          description: Device authentication required
        '401':
          description: Invalid device authentication

  /device/ws-token:
    post:
      tags:
        - Devices
      summary: Get WebSocket token
      description: Get a JWT token for WebSocket authentication (device authentication required)
      responses:
        '200':
          description: WebSocket token issued
          content:
            application/json:
              schema:
                type: object
                properties:
                  deviceToken:
                    type: string
                    description: JWT token for WebSocket authentication
                  expiresIn:
                    type: integer
                    description: Token expiration time in seconds
                    example: 43200
        '400':
          description: Device authentication required
        '401':
          description: Invalid device authentication

  /device/{id}/mode:
    patch:
      tags:
        - Devices
      summary: Change device mode
      description: Update the operating mode of a device
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Device ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - mode
              properties:
                mode:
                  type: string
                  enum: [REGISTRATION, FEEDBACK]
                  description: New device mode
      responses:
        '200':
          description: Device mode updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Device'
        '400':
          description: Invalid request data
        '401':
          description: Authentication required
        '403':
          description: Staff access required
        '404':
          description: Device not found

  /device/{id}/name:
    patch:
      tags:
        - Devices
      summary: Update device name
      description: Update the display name of a device
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Device ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
                  description: New device name
      responses:
        '200':
          description: Device name updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Device'
        '400':
          description: Invalid request data
        '401':
          description: Authentication required
        '403':
          description: Staff access required
        '404':
          description: Device not found

  /device/{id}:
    delete:
      tags:
        - Devices
      summary: Unpair device
      description: Remove device pairing and delete device registration
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Device ID
      responses:
        '204':
          description: Device unpaired successfully
        '401':
          description: Authentication required
        '403':
          description: Staff access required
        '404':
          description: Device not found

  # Pairing Routes
  /pair/generate-qr:
    post:
      tags:
        - Pairing
      summary: Generate QR code for device pairing
      description: Generate a QR code and pairing token for device registration
      responses:
        '200':
          description: QR code generated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  qrCode:
                    type: string
                    description: Base64 encoded QR code image
                  pairingToken:
                    type: string
                    description: Pairing token
                  expiresAt:
                    type: string
                    format: date-time
                    description: Token expiration time
        '401':
          description: Authentication required
        '403':
          description: Staff access required

  /pair/complete:
    post:
      tags:
        - Pairing
      summary: Complete device pairing
      description: Complete the device pairing process using a pairing token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - pairingToken
                - deviceName
              properties:
                pairingToken:
                  type: string
                  description: Pairing token from QR code
                deviceName:
                  type: string
                  description: Device display name
      responses:
        '201':
          description: Device paired successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  deviceId:
                    type: string
                  deviceSecret:
                    type: string
                    description: Device authentication secret
                  name:
                    type: string
        '400':
          description: Invalid pairing token or expired
        '409':
          description: Pairing token already used

  # Feedback Routes
  /feedback/send:
    post:
      tags:
        - Feedback
      summary: Send feedback request to device
      description: Send a feedback request to a specific device for a case
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - caseId
                - deviceId
              properties:
                caseId:
                  type: string
                  description: Case ID
                deviceId:
                  type: string
                  description: Target device ID
      responses:
        '200':
          description: Feedback request sent successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FeedbackSession'
        '400':
          description: Invalid request data
        '401':
          description: Authentication required
        '403':
          description: Staff access required

  /feedback/submit:
    post:
      tags:
        - Feedback
      summary: Submit feedback
      description: Submit student feedback for a case (device authentication required)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - sessionId
                - rating
              properties:
                sessionId:
                  type: string
                  description: Feedback session ID
                rating:
                  type: integer
                  minimum: 1
                  maximum: 5
                  description: Rating from 1 to 5
                comment:
                  type: string
                  description: Optional feedback comment
                  maxLength: 500
      responses:
        '200':
          description: Feedback submitted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Feedback'
        '400':
          description: Invalid request data or device authentication required
        '401':
          description: Invalid device authentication
        '404':
          description: Feedback session not found

  /feedback/override:
    post:
      tags:
        - Feedback
      summary: Override feedback session
      description: Override a feedback session (mark as completed without student input)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - sessionId
              properties:
                sessionId:
                  type: string
                  description: Feedback session ID
                reason:
                  type: string
                  description: Reason for override
      responses:
        '200':
          description: Feedback session overridden successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FeedbackSession'
        '400':
          description: Invalid request data
        '401':
          description: Authentication required
        '403':
          description: Staff access required
        '404':
          description: Feedback session not found

  # Excel Export Routes
  /excel/preview:
    get:
      tags:
        - Excel Export
      summary: Get export preview
      description: Get preview and statistics of data to be exported (admin only)
      parameters:
        - name: status
          in: query
          schema:
            type: array
            items:
              type: string
              enum: [QUEUED, IN_PROGRESS, RESOLVED_PENDING_FEEDBACK, RESOLVED]
          description: Filter by case status
        - name: startDate
          in: query
          schema:
            type: string
            format: date
          description: Filter by start date (ISO format)
        - name: endDate
          in: query
          schema:
            type: string
            format: date
          description: Filter by end date (ISO format)
        - name: staffId
          in: query
          schema:
            type: string
          description: Filter by staff member ID
        - name: category
          in: query
          schema:
            type: string
          description: Filter by case category
        - name: hasFeedback
          in: query
          schema:
            type: string
            enum: [yes, no]
          description: Filter by feedback presence
      responses:
        '200':
          description: Export preview data
          content:
            application/json:
              schema:
                type: object
                properties:
                  totalRecords:
                    type: integer
                  dateRange:
                    type: object
                    properties:
                      start:
                        type: string
                        format: date
                      end:
                        type: string
                        format: date
                  statusBreakdown:
                    type: object
                    additionalProperties:
                      type: integer
                  categoryBreakdown:
                    type: object
                    additionalProperties:
                      type: integer
                  estimatedFileSize:
                    type: string
                    description: Estimated file size for Excel export
        '401':
          description: Authentication required
        '403':
          description: Admin access required

  /excel/cases/json:
    get:
      tags:
        - Excel Export
      summary: Export cases as JSON
      description: Export case data in JSON format (admin only)
      parameters:
        - name: status
          in: query
          schema:
            type: array
            items:
              type: string
              enum: [QUEUED, IN_PROGRESS, RESOLVED_PENDING_FEEDBACK, RESOLVED]
          description: Filter by case status
        - name: startDate
          in: query
          schema:
            type: string
            format: date
          description: Filter by start date (ISO format)
        - name: endDate
          in: query
          schema:
            type: string
            format: date
          description: Filter by end date (ISO format)
        - name: staffId
          in: query
          schema:
            type: string
          description: Filter by staff member ID
        - name: category
          in: query
          schema:
            type: string
          description: Filter by case category
        - name: hasFeedback
          in: query
          schema:
            type: string
            enum: [yes, no]
          description: Filter by feedback presence
      responses:
        '200':
          description: Cases exported as JSON
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CaseExport'
        '401':
          description: Authentication required
        '403':
          description: Admin access required

  /excel/cases/xlsx:
    get:
      tags:
        - Excel Export
      summary: Export cases as Excel
      description: Export case data as Excel file (admin only)
      parameters:
        - name: status
          in: query
          schema:
            type: array
            items:
              type: string
              enum: [QUEUED, IN_PROGRESS, RESOLVED_PENDING_FEEDBACK, RESOLVED]
          description: Filter by case status
        - name: startDate
          in: query
          schema:
            type: string
            format: date
          description: Filter by start date (ISO format)
        - name: endDate
          in: query
          schema:
            type: string
            format: date
          description: Filter by end date (ISO format)
        - name: staffId
          in: query
          schema:
            type: string
          description: Filter by staff member ID
        - name: category
          in: query
          schema:
            type: string
          description: Filter by case category
        - name: hasFeedback
          in: query
          schema:
            type: string
            enum: [yes, no]
          description: Filter by feedback presence
      responses:
        '200':
          description: Excel file download
          content:
            application/vnd.openxmlformats-officedocument.spreadsheetml.sheet:
              schema:
                type: string
                format: binary
          headers:
            Content-Disposition:
              schema:
                type: string
                example: attachment; filename="cases_export_2023-09-16.xlsx"
        '401':
          description: Authentication required
        '403':
          description: Admin access required

  /excel/cases:
    get:
      tags:
        - Excel Export
      summary: Export cases (default format)
      description: Export case data as Excel file
      parameters:
        - name: status
          in: query
          schema:
            type: array
            items:
              type: string
              enum: [QUEUED, IN_PROGRESS, RESOLVED_PENDING_FEEDBACK, RESOLVED]
          description: Filter by case status
        - name: startDate
          in: query
          schema:
            type: string
            format: date
          description: Filter by start date 
        - name: endDate
          in: query
          schema:
            type: string
            format: date
          description: Filter by end date
        - name: staffId
          in: query
          schema:
            type: string
          description: Filter by staff ID
        - name: category
          in: query
          schema:
            type: string
          description: Filter by case category
        - name: hasFeedback
          in: query
          schema:
            type: string
            enum: [yes, no]
          description: Filter by feedback presence
      responses:
        '200':
          description: Excel file download
          content:
            application/vnd.openxmlformats-officedocument.spreadsheetml.sheet:
              schema:
                type: string
                format: binary
          headers:
            Content-Disposition:
              schema:
                type: string
                example: attachment; filename="cases_export_2023-09-16.xlsx"
        '401':
          description: Authentication required
        '403':
          description: Admin access required

components:
  securitySchemes:
    sessionAuth:
      type: apiKey
      in: cookie
      name: sid
      description: Session-based authentication via cookies (for staff/admin users)
    
    deviceAuth:
      type: apiKey
      in: header
      name: Authorisation
      description: Device authentication using device secret (Bearer token)

  schemas:
    User:
      type: object
      properties:
        identityKey:
          type: string
          description: Unique identity key from Azure AD
        tid:
          type: string
          description: Azure AD tenant ID
        upn:
          type: string
          description: Username (email)
        name:
          type: string
          description: Display name
        role:
          type: string
          enum: [STAFF, ADMIN]
          description: User role in the system
      example:
        identityKey: "azure|abc123"
        tid: "tenant-id"
        upn: "user@domain.com"
        name: "John Doe"
        role: "STAFF"

    Case:
      type: object
      properties:
        id:
          type: string
          description: Unique case identifier
        zID:
          type: string
          description: Student ID
        studentName:
          type: string
          description: Student's full name
        category:
          type: string
          description: Support category
        status:
          type: string
          enum: [QUEUED, IN_PROGRESS, RESOLVED_PENDING_FEEDBACK, RESOLVED]
          description: Current case status
        staffId:
          type: string
          nullable: true
          description: Assigned staff member ID
        escalatedTo:
          type: string
          nullable: true
          description: Staff member case was escalated to
        resolvedOnSite:
          type: boolean
          nullable: true
          description: Whether case was resolved onsite
        createdAt:
          type: string
          format: date-time
          description: Case creation timestamp
        resolvedAt:
          type: string
          format: date-time
          nullable: true
          description: Case resolution timestamp
        startedAt:
          type: string
          format: date-time
          nullable: true
          description: When case was first taken by staff
      example:
        id: "case_123"
        zID: "z1234567"
        studentName: "John Doe"
        category: "Technical Support"
        status: "QUEUED"
        staffId: null
        escalatedTo: null
        resolvedOnSite: null
        createdAt: "2023-09-16T10:00:00Z"
        resolvedAt: null
        startedAt: null

    Device:
      type: object
      properties:
        id:
          type: string
          description: Unique device identifier
        name:
          type: string
          description: Device display name
        mode:
          type: string
          enum: [REGISTRATION, FEEDBACK]
          description: Current device mode
        lastSeenAt:
          type: string
          format: date-time
          description: Last heartbeat timestamp
        deletedAt:
          type: string
          format: date-time
          nullable: true
          description: Deletion timestamp (if soft deleted)
        isOnline:
          type: boolean
          description: Whether device is currently online
        status:
          type: string
          enum: [OFFLINE, IDLE, BUSY]
          description: Current device status
        currentLock:
          type: object
          nullable: true
          description: Current device lock information
          properties:
            id:
              type: string
            status:
              type: string
            case:
              type: object
              properties:
                id:
                  type: string
                studentName:
                  type: string
                category:
                  type: string
                status:
                  type: string
            staffName:
              type: string
            leaseExpireAt:
              type: string
              format: date-time
      example:
        id: "device_123"
        name: "Kiosk 1"
        mode: "REGISTRATION"
        lastSeenAt: "2023-09-16T10:00:00Z"
        deletedAt: null
        isOnline: true
        status: "IDLE"
        currentLock: null

    DeviceStatus:
      type: object
      properties:
        deviceId:
          type: string
          description: Device identifier
        mode:
          type: string
          enum: [REGISTRATION, FEEDBACK]
          description: Current device mode
        status:
          type: string
          enum: [IDLE, BUSY]
          description: Current device status
        currentLock:
          type: object
          nullable: true
          description: Current lock information
        lastSeenAt:
          type: string
          format: date-time
          description: Last heartbeat timestamp
      example:
        deviceId: "device_123"
        mode: "REGISTRATION"
        status: "IDLE"
        currentLock: null
        lastSeenAt: "2023-09-16T10:00:00Z"

    FeedbackSession:
      type: object
      properties:
        id:
          type: string
          description: Unique session identifier
        caseId:
          type: string
          description: Associated case ID
        staffId:
          type: string
          description: Staff member who initiated the session
        deviceId:
          type: string
          description: Target device ID
        status:
          type: string
          enum: [CREATED, DELIVERED, SUBMITTED, OVERRIDDEN, CANCELLED, EXPIRED]
          description: Current session status
        createdAt:
          type: string
          format: date-time
          description: Session creation timestamp
        deliveredAt:
          type: string
          format: date-time
          nullable: true
          description: When session was delivered to device
        submittedAt:
          type: string
          format: date-time
          nullable: true
          description: When feedback was submitted
        overriddenAt:
          type: string
          format: date-time
          nullable: true
          description: When session was overridden
        cancelledAt:
          type: string
          format: date-time
          nullable: true
          description: When session was cancelled
        expireAt:
          type: string
          format: date-time
          nullable: true
          description: Session expiration time
      example:
        id: "session_123"
        caseId: "case_123"
        staffId: "staff_123"
        deviceId: "device_123"
        status: "CREATED"
        createdAt: "2023-09-16T10:00:00Z"
        deliveredAt: null
        submittedAt: null
        overriddenAt: null
        cancelledAt: null
        expireAt: "2023-09-16T11:00:00Z"

    Feedback:
      type: object
      properties:
        id:
          type: string
          description: Unique feedback identifier
        caseId:
          type: string
          description: Associated case ID
        staffId:
          type: string
          description: Staff member who handled the case
        rating:
          type: integer
          minimum: 1
          maximum: 5
          description: Feedback rating
        comment:
          type: string
          nullable: true
          description: Optional feedback comment
        createdAt:
          type: string
          format: date-time
          description: Feedback submission timestamp
      example:
        id: "feedback_123"
        caseId: "case_123"
        staffId: "staff_123"
        rating: 5
        comment: "Very helpful service"
        createdAt: "2023-09-16T10:00:00Z"

    CaseExport:
      type: object
      properties:
        zID:
          type: string
          description: Student ID
        studentName:
          type: string
          description: Student's full name
        category:
          type: string
          description: Support category
        createTime:
          type: string
          format: date-time
          description: Case creation time
        takeTime:
          type: string
          format: date-time
          nullable: true
          description: When case was taken by staff
        resolveTime:
          type: string
          format: date-time
          nullable: true
          description: Case resolution time
        processingTime:
          type: integer
          nullable: true
          description: Processing time in seconds
        waitingTime:
          type: integer
          nullable: true
          description: Waiting time in seconds
        staffName:
          type: string
          nullable: true
          description: Staff member who handled the case
        escalatedTo:
          type: string
          nullable: true
          description: Staff member case was escalated to
        feedbackRating:
          type: integer
          nullable: true
          description: Feedback rating
        feedbackComment:
          type: string
          nullable: true
          description: Feedback comment
      example:
        zID: "z1234567"
        studentName: "John Doe"
        category: "Technical Support"
        createTime: "2023-09-16T10:00:00Z"
        takeTime: "2023-09-16T10:05:00Z"
        resolveTime: "2023-09-16T10:15:00Z"
        processingTime: 600
        waitingTime: 300
        staffName: "Jane Staff"
        escalatedTo: null
        feedbackRating: 5
        feedbackComment: "Very helpful"

    Error:
      type: object
      properties:
        error:
          type: string
          description: Error message
        code:
          type: string
          description: Error code (optional)
        details:
          type: object
          description: Additional error details (optional)
      example:
        error: "Authentication required"
        code: "AUTH_REQUIRED"

